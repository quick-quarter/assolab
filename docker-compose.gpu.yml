###############################################################################
# GPU override — merge with docker-compose.yml for NVIDIA GPU acceleration:
#
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up --build
#
# Requires: nvidia-container-toolkit installed on the host.
###############################################################################
services:
  ollama:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
